*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
#authScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;background: radial-gradient(ellipse at 50% 0%, rgba(232,184,75,0.12) 0%, transparent 60%), var(--bg);}

.auth-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:1rem}
.field label{font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--text2)}
.field input{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:.6rem .85rem;transition:border-color .15s}

.auth-btn{width:100%;padding:.7rem;background:var(--accent);color:#1a1200;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s,transform .1s;letter-spacing:.02em;margin-top:.5rem}

async function doRegister(){const username=document.getElementById('regUser').value.trim();const password=document.getElementById('regPass').value;if(!username||!password)return setErr('CompletГЎ los campos');try{const r=await fetch(`${API}/api/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});const d=await r.json();if(!r.ok)return setErr(d.error);storeAuth(d.token,d.username);initApp();}catch{setErr('Error de conexiГіn');}}
function setErr(msg){document.getElementById('authErr').textContent=msg;}
function storeAuth(token,user){TOKEN=token;USERNAME=user;localStorage.setItem('prode_token',token);localStorage.setItem('prode_user',user);}

function isDayUnlocked(idx){if(idx===0)return true;const prev=DATES[idx-1];return byDate[prev].matches.every(m=>isFilled(predictions[m.id]));}

function buildDaysBar(){const bar=document.getElementById('daysBar');bar.innerHTML='';DATES.forEach((date,idx)=>{const info=byDate[date];const tab=document.createElement('button');tab.className='day-tab';tab.dataset.date=date;tab.dataset.idx=idx;tab.innerHTML=`<span class="dt-dow">${info.dow}</span><span class="dt-num">${info.day}</span><span class="dt-mon">${info.mon}</span>`;tab.onclick=()=>{if(!tab.classList.contains('locked'))switchDay(date);};bar.appendChild(tab);});const lb=document.createElement('button');lb.className='day-tab lb-tab';lb.id='lbTabBtn';lb.innerHTML=`<span class="dt-dow">рџЏ†</span><span class="dt-num" style="font-size:11px;font-family:'DM Sans'">Table</span><span class="dt-mon">pts</span>`;lb.onclick=()=>showLeaderboard();bar.appendChild(lb);refreshTabStates();}

function buildMatchCard(m){const sv=predictions[m.id]||{};const isLocked=sv.locked;const pts=scoreBreakdown[m.id];const card=document.createElement('div');card.className='match-card'+(isFilled(sv)?' saved':'')+(isLocked?' locked-card':'');card.id='card-'+m.id;const ptsHtml=pts!==undefined?`<span class="match-pts-badge">+${pts} pts</span>`:'';card.innerHTML=`<div class="match-top"><span class="grp-badge">Grupo ${m.group}</span><div class="match-meta"><span>${m.time}</span><span class="dot"></span><span>${m.venue}</span>${ptsHtml}</div></div><div class="match-teams"><div class="team-side"><span class="team-flag">${m.home[0]}</span><span class="team-name">${m.home[1]}</span></div><div class="score-col"><div class="score-inputs"><input type="number" min="0" max="20" placeholder="вЂ“" value="${sv.h1??''}" id="${m.id}_h1" ${isLocked?'readonly':''} oninput="onFieldChange('${m.id}')"><span class="score-dash">вЂ“</span><input type="number" min="0" max="20" placeholder="вЂ“" value="${sv.a1??''}" id="${m.id}_a1" ${isLocked?'readonly':''} oninput="onFieldChange('${m.id}')"></div></div><div class="team-side right"><span class="team-name right">${m.away[1]}</span><span class="team-flag">${m.away[0]}</span></div></div><div class="match-extras"><div class="extra-block"><span class="extra-label">Tarjetas (loc / vis)<span class="extra-pts">1+1 pt</span></span><div class="extra-inputs"><input type="number" min="0" max="20" placeholder="0" value="${sv.ya??''}" id="${m.id}_ya" ${isLocked?'readonly':''} oninput="onFieldChange('${m.id}')"><span class="extra-sep">вЂ“</span><input type="number" min="0" max="20" placeholder="0" value="${sv.yb??''}" id="${m.id}_yb" ${isLocked?'readonly':''} oninput="onFieldChange('${m.id}')"></div></div><div class="extra-block"><span class="extra-label">Corners (loc / vis)<span class="extra-pts">1+1 pt</span></span><div class="extra-inputs"><input type="number" min="0" max="30" placeholder="0" value="${sv.ca??''}" id="${m.id}_ca" ${isLocked?'readonly':''} oninput="onFieldChange('${m.id}')"><span class="extra-sep">вЂ“</span><input type="number" min="0" max="30" placeholder="0" value="${sv.cb??''}" id="${m.id}_cb" ${isLocked?'readonly':''} oninput="onFieldChange('${m.id}')"></div></div></div>`;return card;}

async function loadMyScore(){try{const r=await fetch(`${API}/api/scores/me`,{headers:authHeaders()});if(!r.ok)return;const d=await r.json();myScore=d.total;scoreBreakdown=d.breakdown;document.getElementById('myScoreVal').textContent=myScore;}catch{}}
const pendingSave={};let saveTimer=null;
function onFieldChange(matchId){pendingSave[matchId]=true;clearTimeout(saveTimer);saveTimer=setTimeout(()=>flushPending(),1000);const g=k=>{const el=document.getElementById(matchId+'_'+k);return el&&el.value!==''?parseInt(el.value):null;};predictions[matchId]=predictions[matchId]||{};predictions[matchId].h1=g('h1');predictions[matchId].a1=g('a1');predictions[matchId].ya=g('ya');predictions[matchId].yb=g('yb');predictions[matchId].ca=g('ca');predictions[matchId].cb=g('cb');const card=document.getElementById('card-'+matchId);if(card)card.classList.toggle('saved',isFilled(predictions[matchId]));refreshTabStates();updateCounter();}
async function flushPending(){const ids=Object.keys(pendingSave);for(const id of ids){delete pendingSave[id];await savePrediction(id);}}
async function savePrediction(matchId){const p=predictions[matchId];if(!p)return;try{await fetch(`${API}/api/predictions/${matchId}`,{method:'POST',headers:authHeaders(),body:JSON.stringify(p)});}catch{}}
async function saveAll(){clearTimeout(saveTimer);MATCHES.forEach(m=>{const g=k=>{const el=document.getElementById(m.id+'_'+k);return el&&el.value!==''?parseInt(el.value):null;};predictions[m.id]={h1:g('h1'),a1:g('a1'),ya:g('ya'),yb:g('yb'),ca:g('ca'),cb:g('cb')};});await flushPending();Object.keys(predictions).forEach(id=>{pendingSave[id]=true;});await flushPending();const toast=document.getElementById('toast');toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);refreshTabStates();updateCounter();await loadMyScore();}
async function renderLeaderboard(){const panel=document.getElementById('lbPanel');panel.innerHTML='<div class="day-title lb-title"><span>рџЏ†</span> Tabla de posiciones</div><button class="lb-refresh" onclick="renderLeaderboard()">в†» Actualizar</button><div id="lbContent">Cargando...</div>';try{const r=await fetch(`${API}/api/leaderboard`,{headers:authHeaders()});const data=await r.json();let html=`<table class="lb-table"><thead><tr><th>Pos.</th><th>Jugador</th><th>PronГіst.</th><th>Puntos</th></tr></thead><tbody>`;data.forEach((u,i)=>{const isMe=u.username===USERNAME;const rankClass=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';html+=`<tr class="lb-row ${rankClass} ${isMe?'me':''}"><td class="rank">${i+1}</td><td class="uname">${u.username}${isMe?' (vos)':''}</td><td>${u.predictions}</td><td class="score-val">${u.score}</td></tr>`;});html+='</tbody></table>';document.getElementById('lbContent').innerHTML=html;}catch{document.getElementById('lbContent').textContent='Error al cargar';}}
function isFilled(sv){return sv&&sv.h1!==null&&sv.h1!==undefined&&sv.a1!==null&&sv.a1!==undefined;}
function updateCounter(){let filled=0;MATCHES.forEach(m=>{if(isFilled(predictions[m.id]))filled++;});document.getElementById('countFilled').textContent=filled;document.getElementById('countTotal').textContent=MATCHES.length;}
if(TOKEN){initApp();}else{document.getElementById('authScreen').style.display='flex';}
</script>
</body>
